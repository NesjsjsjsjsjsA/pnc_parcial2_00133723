server:
  port: 5436
spring:
  application:
    name: Parcial02-Ncapas
  sql:
    init:
      mode: always
  jpa:
    database: postgresql
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5434/magic_wand
    username: postgres
    password: 123456

